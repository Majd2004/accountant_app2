name: accounting_app
description: "تطبيق محاسبة شامل"
publish_to: 'none'
version: 3.0.0+1

environment:
  sdk: ^3.5.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  sqflite: ^2.4.1
  path_provider: ^2.1.5
  share_plus: ^12.0.2
  file_picker: ^11.0.2
  permission_handler: ^12.0.1
  intl: ^0.20.2
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
  assets:
    - assets/fonts/
